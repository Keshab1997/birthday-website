name: Keep Supabase Alive

on:
  schedule:
    # প্রতি ৩ দিন পর পর রাত ১২ টায় (UTC) রান করবে
    - cron: "0 0 */3 * *"
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Supabase pinged successfully!"